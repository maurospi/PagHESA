        <div class="navbar navbar-default navbar-fixed-top" style="background-color: #333;">

                <div class="container-fluid">
                    <div class="navbar-header">
                        <button type="button" class="navbar-toggle collapsed" data-toggle="collapse"
                            data-target="#bs-example-navbar-collapse-1" aria-expanded="false"> <span
                                class="sr-only">Toggle navigation</span> <span class="icon-bar"></span> <span
                                class="icon-bar"></span> <span class="icon-bar"></span> </button>
                        <a id="numero2" class="tooltip2 button" class="navbar-brand" href="../../../index.html"><img
                                src="../../../images/Logo/logoo.png" width="160px" height="50px"
                                alt="Logo Hablando Enseñas S.A.S"><span><img style="height: 100px; width: 125;"
                                    src="../../../gifs/Hablando-en-señas-transparente-bordes.gif"
                                    alt="Gif logo Hablando Enseñas S.A.S señado por una persona sorda"></span></a>
                    </div>
                    <div class="collapse navbar-collapse" id="bs-example-navbar-collapse-1">
                        <ul class="nav navbar-nav">
                            <li class="active"><a class="scroll" href="../index.html">Volver a Presentación</a>
                            </li>
                            <li class="scroll button"><a href="../../../index.html" id="numero2"
                                    class="tooltip2"><span><img style="height: 100px; width: 125;"
                                            src="../../../gifs/Hablando-en-señas-transparente-bordes.gif"
                                            alt="Gif logo Hablando Enseñas S.A.S señado por una persona sorda"></span>Inicio</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <section class="game-section" style="padding-top: 100px; min-height: 80vh;">
        <div class="container">
            <div class="col-md-8 col-md-offset-2">
                <div class="heading">
                    <!--<center><span><img style="height: 150px; width: 200px; text-align: center;"
                                src="../../../gifs/aprende-señas-jugandotransparente-borde.gif"
                                alt="Gif aprende señas jugando"></span></center>-->
                    <h2>Juego: <span>Reconocimiento</span></h2>
                    <div class="line"></div>
                    <p style="text-align:center;">Identifica la seña correcta</p>
                </div>
            </div>

            <div id="game-container" class="game-container wow fadeIn">
                <div class="game-header" style="text-align: center; margin-bottom: 20px;">
                    <span id="score-display" class="score-badge"
                        style="font-size: 1.5rem; font-weight: bold; padding: 10px; background: #345c5c; color: white; border-radius: 20px;">Puntos:
                        0</span>
                    <button class="btn btn-warning" style="margin-left: 10px;"
                        onclick="location.reload()">Reiniciar</button>
                </div>
                <div id="game-area" class="game-area" style="text-align: center;">
                    <!-- Game content will be injected here -->
                </div>
            </div>
        </div>
    </section>

        <div class="bg-sec">
            <div class="container">
                <h2>SIGUENOS EN <strong>NUESTRAS </strong>REDES SOCIALES!</h2>

        </div>

        document.getElementById("year").textContent = new Date().getFullYear();
